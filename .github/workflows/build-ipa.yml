name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npx vite build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync

      - name: List iOS project files
        run: find ios -type f -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "*.app" | head -20

      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -list 2>&1 | head -20
          SCHEME=$(xcodebuild -list | grep -A1 "Schemes:" | tail -1 | xargs)
          echo "Using scheme: $SCHEME"
          xcodebuild -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath ../../build \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r NexusBrowser.ipa Payload/
            ls -la NexusBrowser.ipa
          else
            # Try to find the .app somewhere else
            find build -type d -name "*.app" | head -5
            find /Users -type d -name "*.app" -path "*/Build/*" | head -5
          fi
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NexusBrowser-iOS
          path: NexusBrowser.ipa
