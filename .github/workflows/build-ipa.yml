name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      NEXUS_LIVE_RELOAD_URL: http://192.168.1.111:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npx vite build

      - name: Add iOS platform
        run: npx cap add ios --packagemanager CocoaPods

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Verify live reload configuration
        run: |
          grep -q 'http://192.168.1.111:5173' ios/App/App/capacitor.config.json
          echo "Live reload is configured for $NEXUS_LIVE_RELOAD_URL"

      - name: Verify Nexus native bridge
        run: |
          test -f ios/App/Podfile
          grep -q "NexusBridge" ios/App/Podfile
          grep -q "NexusBridge" ios/App/Podfile.lock
          echo "NexusBridge is linked into the native iOS project."

      - name: List iOS project files
        run: find ios -type f -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "*.app" | head -20

      - name: Build IPA
        run: |
          cd ios/App
          xcodebuild -list 2>&1 | head -20
          echo "Using App workspace and scheme"
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release \
            -derivedDataPath ../../build \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "App path: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r NexusBrowser.ipa Payload/
            ls -la NexusBrowser.ipa
          else
            # Try to find the .app somewhere else
            find build -type d -name "*.app" | head -5
            find /Users -type d -name "*.app" -path "*/Build/*" | head -5
          fi
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NexusBrowser-iOS
          path: NexusBrowser.ipa
